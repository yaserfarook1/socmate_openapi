openapi: 3.0.1
info:
  title: Socmate SOC Investigation API
  description: >
    API for running SOC analyst investigations on security events using
    the Socmate platform. Supports investigation of failed sign-ins,
    suspicious activity, anomalies, and other security incidents with
    configurable time ranges and output options.
  version: "1.0"

servers:
  - url: https://agent.socmate.pcsaisuite.com

paths:
  /api/v1/public/investigate:
    post:
      operationId: InvestigateSecurityEvent
      summary: Investigate a security event or query using the Socmate SOC platform
      description: >
        Submits a natural language security investigation query to the Socmate platform.
        Use this skill to investigate failed sign-ins, suspicious logins, anomalous behavior,
        threat patterns, or any security event. Supports time ranges like 1h, 6h, 24h, 7d.
        Returns a structured summary of findings from the SOC analyst perspective.
        Always set include_raw_results and include_tool_calls to false unless explicitly asked.
        #ExamplePrompts Investigate failed sign-ins in the last 1 hour using Socmate
        #ExamplePrompts Show suspicious login activity from the last 6 hours
        #ExamplePrompts Identify anomalous behavior for privileged accounts in the last 24 hours
        #ExamplePrompts Run a SOC investigation on security events in the last 24 hours
        #ExamplePrompts Summarize threat activity detected in the last 7 days using Socmate
        #ExamplePrompts Check for suspicious logins or anomalies in the past hour
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
                - persona
                - provider
              properties:
                query:
                  type: string
                  description: >
                    Natural language investigation query describing what security event
                    to investigate. Examples: "Investigate failed sign-ins in the last 1 hour",
                    "Summarize suspicious login activity in the last 6 hours",
                    "Identify anomalous behavior for privileged accounts in the last 24 hours".
                persona:
                  type: string
                  description: >
                    The analyst persona to use for the investigation. Use 'soc_analyst'
                    for standard SOC investigations.
                  enum:
                    - soc_analyst
                  default: soc_analyst
                provider:
                  type: string
                  description: >
                    The security data provider to query. Use 'sentinel' for Microsoft Sentinel.
                  enum:
                    - sentinel
                  default: sentinel
                options:
                  type: object
                  description: Optional configuration for the investigation output format.
                  properties:
                    include_entity_diagram:
                      type: boolean
                      description: Whether to include an entity relationship diagram in the output. Keep false to reduce response size.
                      default: false
                    include_structured_content:
                      type: boolean
                      description: Whether to include structured content in the response.
                      default: true
                    include_tool_calls:
                      type: boolean
                      description: Whether to include the internal tool calls made during investigation. Keep false to reduce response size.
                      default: false
                    include_raw_results:
                      type: boolean
                      description: Whether to include raw query results in the response. Keep false to reduce response size.
                      default: false
                    time_range:
                      type: string
                      description: >
                        Time range for the investigation. Accepted values: 1h, 6h, 12h, 24h, 7d, 30d.
                        Defaults to 1h if not specified.
                      default: "1h"
                      example: "1h"
      responses:
        "200":
          description: Successful investigation response with structured findings.
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: string
                    description: High-level natural language summary of the investigation findings.
                  findings:
                    type: object
                    description: Detailed structured findings from the investigation.
                    properties:
                      risk_level:
                        type: string
                        description: Overall risk level determined by the investigation (e.g. Low, Medium, High, Critical).
                      total_events:
                        type: integer
                        description: Total number of security events identified.
                      affected_users:
                        type: array
                        description: List of user accounts involved in the security events.
                        items:
                          type: string
                      affected_ips:
                        type: array
                        description: List of IP addresses involved in the security events.
                        items:
                          type: string
                      events:
                        type: array
                        description: List of individual security events identified.
                        items:
                          type: object
                          properties:
                            timestamp:
                              type: string
                              description: Time the event occurred.
                            event_type:
                              type: string
                              description: Type of security event (e.g. FailedSignIn, AnomalousLogin).
                            description:
                              type: string
                              description: Human-readable description of the event.
                            source_ip:
                              type: string
                              description: Source IP address associated with the event.
                            user:
                              type: string
                              description: User account associated with the event.
                            severity:
                              type: string
                              description: Severity level of the individual event.
                  structured_content:
                    type: object
                    description: Structured analysis blocks including analysis, recommendations, and indicators of compromise.
                    properties:
                      analysis:
                        type: string
                        description: Detailed analyst narrative of the investigation findings.
                      recommendations:
                        type: array
                        description: List of recommended remediation or investigation actions.
                        items:
                          type: string
                      iocs:
                        type: array
                        description: Indicators of compromise identified during investigation.
                        items:
                          type: string
                      mitre_techniques:
                        type: array
                        description: MITRE ATT&CK techniques identified, if any.
                        items:
                          type: string
        "400":
          description: Bad request — invalid query or missing required fields.
        "401":
          description: Unauthorized — invalid or missing API key.
        "500":
          description: Internal server error from the Socmate platform.
