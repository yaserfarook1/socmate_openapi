openapi: 3.0.0
info:
  title: SOCmate AI Security Investigator
  description: >
    AI-powered SOC investigation API. Submit natural language security queries
    and receive structured findings from Microsoft Sentinel via the SOCmate platform.
    Supports investigation of failed sign-ins, suspicious activity, lateral movement,
    threat actors, and any security event within a configurable time range.
  version: "v1"

servers:
  - url: https://agent.socmate.pcsaisuite.com/api/v1/public

paths:
  /investigate:
    post:
      operationId: InvestigateSecurityQuery
      summary: Run an AI-powered security investigation using natural language
      description: >
        Submit a natural language security investigation query against Microsoft Sentinel.
        The SOCmate AI applies a SOC analyst persona to analyze signals and returns
        structured findings. Use this for investigating failed sign-ins, brute force
        attempts, suspicious logins, lateral movement, high-severity alerts, anomalous
        activity, and any other security events within a specified time range.
        Examples of valid queries:
        "Investigate failed sign-ins in the last 1 hour and summarize the findings."
        "Summarize all high severity alerts from the last 24 hours."
        "Check for lateral movement or privilege escalation in the last 6 hours."
        "Are there any brute force attacks in the last 30 minutes?"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestigateRequest"
      responses:
        "200":
          description: Investigation completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestigateResponse"
        "400":
          description: Bad request — missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized — invalid or missing API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    InvestigateRequest:
      type: object
      required:
        - query
        - persona
        - provider
      properties:
        query:
          type: string
          description: >
            Natural language security investigation query. Be specific about what
            to investigate and the time window (e.g. "last 1 hour", "last 24 hours").
        persona:
          type: string
          description: SOC analyst persona to use. Always use 'soc_analyst'.
          enum:
            - soc_analyst
          default: soc_analyst
        provider:
          type: string
          description: Security data provider. Always use 'sentinel' for Microsoft Sentinel.
          enum:
            - sentinel
          default: sentinel
        options:
          $ref: "#/components/schemas/InvestigateOptions"

    InvestigateOptions:
      type: object
      description: Controls what content is included in the response.
      properties:
        include_entity_diagram:
          type: boolean
          description: Include an entity relationship diagram.
          default: false
        include_structured_content:
          type: boolean
          description: Include structured/formatted content breakdown.
          default: true
        include_tool_calls:
          type: boolean
          description: Include internal tool calls made during the investigation.
          default: false
        include_raw_results:
          type: boolean
          description: Include raw query results from the provider.
          default: false
        time_range:
          type: string
          description: >
            Time range for the investigation. Map user language to enum values:
            "last 15 minutes" = 15m, "last 30 minutes" = 30m, "last hour" = 1h,
            "last 3 hours" = 3h, "last 6 hours" = 6h, "last 12 hours" = 12h,
            "last 24 hours" or "today" = 24h, "last 2 days" = 48h,
            "last week" = 7d, "last month" = 30d.
          enum:
            - 15m
            - 30m
            - 1h
            - 3h
            - 6h
            - 12h
            - 24h
            - 48h
            - 7d
            - 30d
          default: 1h

    InvestigateResponse:
      type: object
      properties:
        summary:
          type: string
          description: Natural language summary of the investigation findings.
        structured_content:
          type: object
          description: Structured breakdown of the findings.
          additionalProperties: true
        entity_diagram:
          type: string
          nullable: true
        tool_calls:
          type: array
          items:
            type: object
            additionalProperties: true
        raw_results:
          type: object
          additionalProperties: true
        metadata:
          type: object
          properties:
            time_range:
              type: string
            provider:
              type: string
            persona:
              type: string
            query:
              type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: integer

security:
  - ApiKeyAuth: []
