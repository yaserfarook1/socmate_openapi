{
  "openapi": "3.0.1",
  "info": {
    "title": "SoCMate Public API",
    "description": "SoCMate Public Investigation API for external integrations. Authenticate with an API key (X-API-Key header) or OAuth2 Bearer token.",
    "version": "0.1.0"
  },
  "paths": {
    "/api/v1/public/investigate": {
      "post": {
        "tags": [
          "public-api"
        ],
        "summary": "Run a synchronous SOC investigation",
        "description": "Accepts a natural-language investigation prompt, runs the full SOC investigation pipeline, and returns a single JSON response with findings, entities, structured data, and metadata. Authenticate with either an opaque X-API-Key value or a Bearer token.",
        "operationId": "investigate_api_v1_public_investigate_post",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/PublicInvestigateRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/PublicInvestigateResponse"
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        }
      }
    }
  },
